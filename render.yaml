services:
  - type: web
    name: connect-frontend
    runtime: node
    rootDir: frontend
    buildCommand: pnpm install && pnpm build
    startCommand: pnpm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://connect-gov-backend.onrender.com/api
      - key: NODE_VERSION
        value: 18
