jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1. Setup Node FIRST
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      # 2. Install pnpm SECOND (CRITICAL)
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10
          run_install: false

      # 3. Verify pnpm exists (debug safety)
      - name: Check pnpm
        run: pnpm -v

      # 4. Install dependencies
      - name: Install deps
        run: pnpm install --frozen-lockfile

      # 5. Run frontend
      - run: pnpm --filter frontend lint
      - run: pnpm --filter frontend build

      # 6. Run backend
      - run: pnpm --filter backend lint
      - run: pnpm --filter backend build